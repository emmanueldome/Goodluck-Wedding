<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Reception Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= COLORS ================= */

:root{

  --navy-dark:#1E224F;
  --navy:#3A4572;

  --coral:#E4876A;
  --blush:#F1B6A8;

  --ivory:#F5E3DC;
  --white:#FFFFFF;

}

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ================= BODY ================= */

body{

  font-family:'Playfair Display', serif;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  background:
  linear-gradient(
    rgba(30,34,79,.92),
    rgba(58,69,114,.92)
  );

}

/* ================= CONTAINER ================= */

.container{

  width:100%;
  max-width:600px;

  background:rgba(255,255,255,.98);

  border-radius:30px;

  padding:40px;

  text-align:center;

  border:2px solid var(--blush);

  box-shadow:
  0 20px 50px rgba(0,0,0,.20);

  animation:fadeIn .6s ease;

}

/* ================= LOGO ================= */

.wedding-logo{

  width:90px;
  height:90px;

  margin:0 auto 20px;

  border-radius:50%;

  background:
  linear-gradient(
    135deg,
    var(--coral),
    var(--blush)
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;

  font-size:2.5rem;

  box-shadow:
  0 10px 25px rgba(0,0,0,.15);

}

/* ================= TITLES ================= */

h1{

  color:var(--navy-dark);

  font-size:2rem;

  text-transform:uppercase;

  letter-spacing:1px;

  margin-bottom:10px;

}

h1::after{

  content:"";

  display:block;

  width:90px;
  height:3px;

  margin:12px auto 0;

  border-radius:50px;

  background:
  linear-gradient(
    90deg,
    var(--coral),
    var(--blush)
  );

}

.subtitle{

  color:#666;

  margin-top:15px;

  margin-bottom:25px;

  line-height:1.6;

}

/* ================= INPUT ================= */

input{

  width:100%;

  padding:15px;

  border-radius:15px;

  border:1px solid var(--blush);

  font-size:1rem;

  transition:.3s;

}

input:focus{

  outline:none;

  border-color:var(--coral);

  box-shadow:
  0 0 0 4px rgba(228,135,106,.15);

}

/* ================= BUTTON ================= */

button{

  width:100%;

  padding:15px;

  margin-top:15px;

  border:none;

  border-radius:30px;

  font-size:1rem;

  font-weight:600;

  cursor:pointer;

  color:white;

  background:
  linear-gradient(
    135deg,
    var(--navy-dark),
    var(--navy)
  );

  transition:.3s;

}

button:hover{

  background:
  linear-gradient(
    135deg,
    var(--coral),
    var(--blush)
  );

  transform:translateY(-2px);

}

/* ================= RESULTS ================= */

#results{

  margin-top:25px;

  padding:20px;

  border-radius:15px;

  text-align:left;

  background:
  linear-gradient(
    135deg,
    #fff9f8,
    #ffffff
  );

  border:1px solid var(--blush);

}

#results h3{

  color:var(--navy-dark);

  margin-bottom:15px;

}

.guest-item{

  padding:10px 0;

  border-bottom:1px solid #eee;

}

.guest-item:last-child{

  border-bottom:none;

}

.total-count{

  margin-top:20px;

  text-align:center;

  color:var(--navy-dark);

  font-size:1.1rem;

  font-weight:600;

}

/* ================= ANIMATION ================= */

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* ================= MOBILE ================= */

@media(max-width:600px){

  .container{
    padding:25px;
  }

  h1{
    font-size:1.6rem;
  }

  .wedding-logo{
    width:75px;
    height:75px;
    font-size:2rem;
  }

}

/* Hide Reception Panel Until Login */

#receptionPanel{
  display:none;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginBox" class="container">

<div class="wedding-logo">💍</div>

<h1>Reception Access</h1>

<p class="subtitle">
Enter Reception Password
</p>

<input
type="password"
id="receptionPassword"
placeholder="Enter Password">

<button onclick="loginReception()">
🔓 Enter Reception
</button>

</div>

<!-- RECEPTION PANEL -->

<div id="receptionPanel" class="container">

<div class="wedding-logo">🥂</div>

<h1>Wedding Reception</h1>

<p class="subtitle">
Guest Check-In System
</p>

<input
list="guestList"
id="guestName"
placeholder="Search Guest Name">

<datalist id="guestList">

<option value="Mr & Mrs Godwin Msigwa">
<option value="Mr Mwaisanila">
<option value="Irene Masalu">
<option value="Mr & Mrs Emmanuel Dome">

</datalist>

<button onclick="confirmEntry()">
✅ Confirm Entry
</button>

<button onclick="viewEntries()">
📋 View Checked Guests
</button>

<div id="results"></div>

</div>

<script>

/* ================= LOGIN ================= */

function loginReception(){

const password =
document.getElementById(
"receptionPassword"
).value;

if(password==="2406"){

document.getElementById(
"loginBox"
).style.display="none";

document.getElementById(
"receptionPanel"
).style.display="block";

}else{

alert("Wrong Password ❌");

}

}

/* ================= CHECK-IN ================= */

function confirmEntry(){

const guest =
document.getElementById(
"guestName"
).value.trim();

if(guest===""){

alert("Please enter guest name.");

return;

}

let entries =
JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];

const exists =
entries.some(
e =>
e.guest.toLowerCase() ===
guest.toLowerCase()
);

if(exists){

alert("Guest already entered ⚠️");

return;

}

entries.push({

guest:guest,

time:new Date().toLocaleTimeString()

});

localStorage.setItem(

"guestEntries",

JSON.stringify(entries)

);

alert("Guest entry confirmed ✅");

document.getElementById(
"guestName"
).value="";

viewEntries();

}

/* ================= VIEW ENTRIES ================= */

function viewEntries(){

const entries =
JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];

let html =
"<h3>Checked Guests</h3>";

if(entries.length===0){

html +=
"<p>No guests checked in yet.</p>";

}else{

entries.forEach(
(e,index)=>{

html += `

<div class="guest-item">

<strong>${index+1}. ${e.guest}</strong>

<br>

<small>${e.time}</small>

</div>

`;

});

}

html += `

<div class="total-count">

Total Checked Guests:
<strong>${entries.length}</strong>

</div>

`;

document.getElementById(
"results"
).innerHTML =
html;

}

viewEntries();

</script>

</body>
</html>
