<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Wedding Reception</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{

  --navy-dark:#1E224F;
  --navy:#3A4572;

  --coral:#E4876A;
  --blush:#F1B6A8;

  --ivory:#F5E3DC;
  --white:#FFFFFF;

}

/* ================= BODY ================= */

body{

  font-family:'Playfair Display',serif;

  background:
  linear-gradient(
    rgba(30,34,79,.88),
    rgba(58,69,114,.88)
  );

  display:flex;

  justify-content:center;

  align-items:center;

  min-height:100vh;

  padding:20px;

  margin:0;

}

/* ================= CONTAINER ================= */

.container{

  background:rgba(255,255,255,.98);

  padding:35px;

  width:100%;

  max-width:550px;

  border-radius:25px;

  border:2px solid var(--blush);

  box-shadow:
  0 15px 35px rgba(0,0,0,.15);

  text-align:center;

}

/* ================= TITLES ================= */

h1{

  color:var(--navy-dark);

  margin-bottom:10px;

  letter-spacing:1px;

}

h1::after{

  content:"";

  display:block;

  width:80px;

  height:3px;

  margin:12px auto 0;

  border-radius:50px;

  background:
  linear-gradient(
    90deg,
    var(--coral),
    var(--blush)
  );

}

p{

  color:#555;

}

/* ================= INPUT ================= */

input{

  width:100%;

  padding:14px;

  border-radius:15px;

  border:1px solid var(--blush);

  margin-top:20px;

  font-size:1rem;

  box-sizing:border-box;

}

input:focus{

  outline:none;

  border-color:var(--coral);

  box-shadow:
  0 0 0 4px rgba(228,135,106,.18);

}

/* ================= BUTTON ================= */

button{

  width:100%;

  padding:15px;

  margin-top:15px;

  border:none;

  border-radius:30px;

  font-size:1rem;

  font-weight:bold;

  cursor:pointer;

  color:white;

  background:
  linear-gradient(
    135deg,
    var(--navy-dark),
    var(--navy)
  );

  transition:.3s;

}

button:hover{

  background:
  linear-gradient(
    135deg,
    var(--coral),
    var(--blush)
  );

  transform:translateY(-2px);

}

/* ================= RESULTS ================= */

#results{

  margin-top:20px;

  padding:15px;

  background:
  linear-gradient(
    135deg,
    #fff9f8,
    #ffffff
  );

  border:1px solid var(--blush);

  border-radius:15px;

  text-align:left;

}

/* ================= RECEPTION PANEL ================= */

#receptionPanel{

  display:none;

}

.total-count{

  color:var(--navy-dark);

  font-size:1.1rem;

  margin-top:10px;

}

/* ================= MOBILE ================= */

@media(max-width:600px){

.container{

padding:25px;

}

}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginBox" class="container">

<h1>Reception Access</h1>

<p>Enter Reception Password</p>

<input
type="password"
id="receptionPassword"
placeholder="Password">

<button onclick="loginReception()">

🔓 Enter

</button>

</div>

<!-- RECEPTION PANEL -->

<div
id="receptionPanel"
class="container">

<h1>Wedding Reception</h1>

<p>Confirm Guest Entry</p>

<input
list="guestList"
id="guestName"
placeholder="Search guest name">

<datalist id="guestList">

<option value="Mr & Mrs Godwin Msigwa">
<option value="Mr Mwaisanila">
<option value="Irene Masalu">

</datalist>

<button onclick="confirmEntry()">

✅ Confirm Entry

</button>

<button onclick="viewEntries()">

📋 View Entries

</button>

<div id="results"></div>

</div>

<script>

function loginReception(){

const password =
document.getElementById(
"receptionPassword"
).value;

if(password==="2406"){

document.getElementById(
"loginBox"
).style.display="none";

document.getElementById(
"receptionPanel"
).style.display="block";

}else{

alert(
"Wrong password ❌"
);

}

}

function confirmEntry(){

const guest=
document.getElementById(
"guestName"
).value.trim();

if(guest===""){

alert(
"Enter guest name"
);

return;

}

let entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];

const exists=

entries.some(
e=>
e.guest.toLowerCase()
===
guest.toLowerCase()
);

if(exists){

alert(
"Guest already entered ⚠️"
);

return;

}

entries.push({

guest:guest,

time:new Date()
.toLocaleTimeString()

});

localStorage.setItem(

"guestEntries",

JSON.stringify(
entries
)

);

alert(
"Entry confirmed ✅"
);

document.getElementById(
"guestName"
).value="";

viewEntries();

}

function viewEntries(){

const entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];

let html=
"<h3 style='color:#1E224F;'>Checked Guests</h3>";

entries.forEach(
(e,index)=>{

html+=`

<b>${index+1}.</b>
${e.guest}

<br>

<small>
${e.time}
</small>

<hr>

`;

});

html+=

`<div class="total-count">
Total Guests:
<b>${entries.length}</b>
</div>`;

document.getElementById(
"results"
).innerHTML=
html;

}

viewEntries();

</script>

</body>
</html>
